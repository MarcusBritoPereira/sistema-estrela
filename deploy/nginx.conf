# Configuração do Nginx para a Distribuidora Estrela BI
# Caminho sugerido no VPS: /etc/nginx/sites-available/sistema-estrela

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Substitua pelo seu domínio quando estiver totalmente apontado
    server_name 187.77.19.176 distribuidoraestrela.cloud www.distribuidoraestrela.cloud;

    # Limite máximo de upload (útil para relatórios pesados ou fotos se necessário)
    client_max_body_size 50M;

    # Configurações de compressão Gzip para melhor performance
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 1. NestJS Backend API Proxy
    location /api/ {
        # Reescreve a URL removendo o prefixo /api para rotas diretas do NestJS
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        
        # Headers essenciais de proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # timeouts mais longos para geração de grandes PDFs/Planilhas
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # 2. Next.js Frontend Standalone Proxy
    location / {
        proxy_pass http://127.0.0.1:3001;
        
        # Headers essenciais de proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
